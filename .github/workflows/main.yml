name: generate animation

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 生成浅色版贪吃蛇（包含私有仓库）
      - name: generate light snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: blackirlsama
          days: 365  # 只统计近365天，和GitHub贡献图对齐
          outputs: dist/github-contribution-grid-snake.svg
        env:
          # 关键：用自定义的SNAKE_TOKEN，而非默认的GITHUB_TOKEN
          GITHUB_TOKEN: ${{ secrets.SNAKE_TOKEN }}

      # 生成深色版贪吃蛇（包含私有仓库）
      - name: generate dark snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: blackirlsama
          days: 365
          palette: github-dark
          outputs: dist/github-contribution-grid-snake-dark.svg
        env:
          GITHUB_TOKEN: ${{ secrets.SNAKE_TOKEN }}

      # 推送文件到output分支
      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
          keep_history: false
        env:
          # 推送分支用默认的GITHUB_TOKEN即可（权限足够）
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
